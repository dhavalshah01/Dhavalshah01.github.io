<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">ACS Retirement — Discovery Workflow</text>
  <line x1="100" y1="52" x2="800" y2="52" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="40" y="80" width="150" height="80" rx="10" fill="#0078d4" />
  <text x="115" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="white">Step 1</text>
  <text x="115" y="130" text-anchor="middle" font-size="11" fill="white">Install &amp; Configure</text>
  <text x="115" y="145" text-anchor="middle" font-size="11" fill="white">M365 Assessment Tool</text>

  <!-- Arrow -->
  <line x1="190" y1="120" x2="225" y2="120" stroke="#0078d4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="225" y="80" width="150" height="80" rx="10" fill="#0078d4"/>
  <text x="300" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="white">Step 2</text>
  <text x="300" y="130" text-anchor="middle" font-size="11" fill="white">Register Entra App</text>
  <text x="300" y="145" text-anchor="middle" font-size="11" fill="white">+ Grant Admin Consent</text>

  <!-- Arrow -->
  <line x1="375" y1="120" x2="410" y2="120" stroke="#0078d4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="410" y="80" width="150" height="80" rx="10" fill="#0078d4"/>
  <text x="485" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="white">Step 3</text>
  <text x="485" y="130" text-anchor="middle" font-size="11" fill="white">Run Tenant Scan</text>
  <text x="485" y="145" text-anchor="middle" font-size="11" fill="white">Mode: AddInsACS</text>

  <!-- Arrow -->
  <line x1="560" y1="120" x2="595" y2="120" stroke="#0078d4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="595" y="80" width="150" height="80" rx="10" fill="#0078d4"/>
  <text x="670" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="white">Step 4</text>
  <text x="670" y="130" text-anchor="middle" font-size="11" fill="white">Export Report</text>
  <text x="670" y="145" text-anchor="middle" font-size="11" fill="white">CSV + Power BI</text>

  <!-- Arrow down from Step 4 -->
  <line x1="670" y1="160" x2="670" y2="200" stroke="#0078d4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Output Box -->
  <rect x="40" y="200" width="820" height="100" rx="10" fill="#e6f2fb" stroke="#0078d4" stroke-width="1.5"/>
  <text x="450" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#0078d4">Assessment Output — 97 Sites Scanned</text>

  <!-- Output items -->
  <rect x="70" y="242" width="155" height="42" rx="6" fill="white" stroke="#b3d6f0" stroke-width="1"/>
  <text x="147" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">9 ACS Principals</text>
  <text x="147" y="276" text-anchor="middle" font-size="10" fill="#555">All Expired</text>

  <rect x="245" y="242" width="155" height="42" rx="6" fill="white" stroke="#b3d6f0" stroke-width="1"/>
  <text x="322" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">8 SharePoint Add-Ins</text>
  <text x="322" y="276" text-anchor="middle" font-size="10" fill="#555">3 Types</text>

  <rect x="420" y="242" width="155" height="42" rx="6" fill="white" stroke="#b3d6f0" stroke-width="1"/>
  <text x="497" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">3 Tenant-Scoped</text>
  <text x="497" y="276" text-anchor="middle" font-size="10" fill="#555">FullControl — HIGH Risk</text>

  <rect x="595" y="242" width="155" height="42" rx="6" fill="white" stroke="#b3d6f0" stroke-width="1"/>
  <text x="672" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">CSV + Power BI</text>
  <text x="672" y="276" text-anchor="middle" font-size="10" fill="#555">Full Audit Report</text>

  <!-- Arrow down to next phase -->
  <line x1="450" y1="300" x2="450" y2="335" stroke="#107c10" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Analysis & Plan box -->
  <rect x="200" y="335" width="500" height="80" rx="10" fill="#107c10"/>
  <text x="450" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="white">Analyze → Prioritize → Build Migration Plan</text>
  <text x="450" y="382" text-anchor="middle" font-size="11" fill="#d4edda">Risk-stratified by scope · permission level · app type</text>
  <text x="450" y="398" text-anchor="middle" font-size="11" fill="#d4edda">Vendor tracks · Custom code modernization · SPFx replacements</text>

  <!-- Footer note -->
  <text x="450" y="460" text-anchor="middle" font-size="10" fill="#888">Tool: github.com/pnp/pnpassessment  |  Auth: Entra ID Certificate (Application Mode)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0078d4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#107c10"/>
    </marker>
  </defs>
</svg>
