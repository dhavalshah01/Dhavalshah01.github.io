<svg width="900" height="540" viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="540" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">App Risk Stratification — Priority Matrix</text>
  <line x1="80" y1="50" x2="820" y2="50" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Column headers -->
  <rect x="200" y="65" width="200" height="36" rx="6" fill="#c50f1f"/>
  <text x="300" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="white">HIGH PRIORITY</text>

  <rect x="420" y="65" width="200" height="36" rx="6" fill="#e07000"/>
  <text x="520" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="white">MEDIUM PRIORITY</text>

  <rect x="640" y="65" width="200" height="36" rx="6" fill="#107c10"/>
  <text x="740" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="white">LOW PRIORITY</text>

  <!-- Row header column -->
  <rect x="30" y="115" width="155" height="52" rx="6" fill="#e8e8f0"/>
  <text x="107" y="137" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">Tenant-Scoped</text>
  <text x="107" y="153" text-anchor="middle" font-size="10" fill="#555">Broadest access</text>

  <rect x="30" y="180" width="155" height="52" rx="6" fill="#e8e8f0"/>
  <text x="107" y="202" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">Site-Scoped</text>
  <text x="107" y="218" text-anchor="middle" font-size="10" fill="#555">Limited to one site</text>

  <rect x="30" y="245" width="155" height="52" rx="6" fill="#e8e8f0"/>
  <text x="107" y="267" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">Marketplace</text>
  <text x="107" y="283" text-anchor="middle" font-size="10" fill="#555">Third-party vendor</text>

  <rect x="30" y="310" width="155" height="52" rx="6" fill="#e8e8f0"/>
  <text x="107" y="332" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">SharePoint-Hosted</text>
  <text x="107" y="348" text-anchor="middle" font-size="10" fill="#555">Add-In model retiring</text>

  <!-- HIGH cells -->
  <rect x="200" y="115" width="200" height="52" rx="6" fill="#fde7e7" stroke="#c50f1f" stroke-width="1.5"/>
  <text x="300" y="136" text-anchor="middle" font-size="11" font-weight="600" fill="#c50f1f">Valo Intranet</text>
  <text x="300" y="152" text-anchor="middle" font-size="10" fill="#8b0000">FullControl · Vendor upgrade track</text>

  <rect x="200" y="245" width="200" height="52" rx="6" fill="#fde7e7" stroke="#c50f1f" stroke-width="1.5"/>
  <text x="300" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#c50f1f">Plumsail Org Chart</text>
  <text x="300" y="282" text-anchor="middle" font-size="10" fill="#8b0000">Provider-hosted · Expired</text>

  <!-- Tenant-scoped, HIGH: SiteAdminCApp -->
  <rect x="200" y="180" width="200" height="52" rx="6" fill="#fde7e7" stroke="#c50f1f" stroke-width="1.5"/>
  <text x="300" y="201" text-anchor="middle" font-size="11" font-weight="600" fill="#c50f1f">SiteAdminCApp</text>
  <text x="300" y="217" text-anchor="middle" font-size="10" fill="#8b0000">Custom app · FullControl · Unknown owner</text>

  <!-- MEDIUM cells -->
  <rect x="420" y="180" width="200" height="52" rx="6" fill="#fff4e6" stroke="#e07000" stroke-width="1.5"/>
  <text x="520" y="201" text-anchor="middle" font-size="11" font-weight="600" fill="#e07000">PnP Automation Scripts</text>
  <text x="520" y="217" text-anchor="middle" font-size="10" fill="#7a3a00">4 principals · File ops · Write scope</text>

  <rect x="420" y="245" width="200" height="52" rx="6" fill="#fff4e6" stroke="#e07000" stroke-width="1.5"/>
  <text x="520" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#e07000">Saketa Employee Dir.</text>
  <text x="520" y="282" text-anchor="middle" font-size="10" fill="#7a3a00">SharePoint-hosted · Active</text>

  <rect x="420" y="310" width="200" height="52" rx="6" fill="#fff4e6" stroke="#e07000" stroke-width="1.5"/>
  <text x="520" y="331" text-anchor="middle" font-size="11" font-weight="600" fill="#e07000">User Profile Directory</text>
  <text x="520" y="347" text-anchor="middle" font-size="10" fill="#7a3a00">Multiple sites · Active usage</text>

  <!-- LOW cells -->
  <rect x="640" y="180" width="200" height="52" rx="6" fill="#eaf5ea" stroke="#107c10" stroke-width="1.5"/>
  <text x="740" y="201" text-anchor="middle" font-size="11" font-weight="600" fill="#107c10">Plumsail Guest Access</text>
  <text x="740" y="217" text-anchor="middle" font-size="10" fill="#0a4a0a">Guest scope · /sites/Archive</text>

  <rect x="640" y="245" width="200" height="52" rx="6" fill="#eaf5ea" stroke="#107c10" stroke-width="1.5"/>
  <text x="740" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#107c10">iTOS Apps (x2)</text>
  <text x="740" y="282" text-anchor="middle" font-size="10" fill="#0a4a0a">Sunperry · Archive site</text>

  <rect x="640" y="310" width="200" height="52" rx="6" fill="#eaf5ea" stroke="#107c10" stroke-width="1.5"/>
  <text x="740" y="331" text-anchor="middle" font-size="11" font-weight="600" fill="#107c10">Blackboard Branding</text>
  <text x="740" y="347" text-anchor="middle" font-size="10" fill="#0a4a0a">CSS-only · Replace with themes</text>

  <!-- Empty cells (grey placeholder) -->
  <rect x="420" y="115" width="200" height="52" rx="6" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="520" y="146" text-anchor="middle" font-size="10" fill="#999">— No medium tenant-scoped apps —</text>

  <rect x="640" y="115" width="200" height="52" rx="6" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="740" y="146" text-anchor="middle" font-size="10" fill="#999">— No low tenant-scoped apps —</text>

  <!-- Legend -->
  <rect x="30" y="390" width="840" height="120" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="450" y="413" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">Migration Track Legend</text>

  <!-- Legend items -->
  <rect x="60" y="425" width="12" height="12" rx="2" fill="#c50f1f"/>
  <text x="80" y="436" font-size="10" fill="#333">Vendor engagement + Entra app registration</text>

  <rect x="280" y="425" width="12" height="12" rx="2" fill="#e07000"/>
  <text x="300" y="436" font-size="10" fill="#333">Update scripts to certificate-based PnP auth</text>

  <rect x="530" y="425" width="12" height="12" rx="2" fill="#107c10"/>
  <text x="550" y="436" font-size="10" fill="#333">Replace with SPFx web parts or native features</text>

  <rect x="60" y="448" width="12" height="12" rx="2" fill="#0078d4"/>
  <text x="80" y="459" font-size="10" fill="#333">All migrations: retire old ACS principal after validation</text>

  <rect x="350" y="448" width="12" height="12" rx="2" fill="#1a1a2e"/>
  <text x="370" y="459" font-size="10" fill="#333">Final step: Set-SPOTenant -DisableCustomAppAuthentication $true</text>
</svg>
